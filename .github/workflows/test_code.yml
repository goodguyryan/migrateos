name: Run Python tests
on:
    push:

jobs:
    run_tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: |
                  pip install -e .

            - name: Run tests
              run: |
                  pytest tests/
