# __VERSION_NOTE__
---
- name: Install cron scripts
  ansible.builtin.copy:
    src: "files/{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ cron_files }}"
  when: cron_files | default([]) | length > 0

- name: Enable and start systemd timers
  ansible.builtin.systemd:
    name: "{{ item.name }}"
    enabled: "{{ item.enabled | default(true) }}"
    state: started
    daemon_reload: yes
  loop: "{{ cron_timers }}"
  when: cron_timers | default([]) | length > 0
